<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RunRun Tests</title>
    <style>
      body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; padding: 16px; background: #f6f6f2; color: #171717; }
      .test { padding: 10px 12px; border: 1px solid #e7e4dc; border-radius: 12px; margin-bottom: 10px; background: #ffffff; }
      .ok { color: #126a3a; }
      .fail { color: #b42318; }
      pre { background: #fbfbf8; padding: 8px; border-radius: 10px; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>RunRun smoke tests</h1>
    <div id="results"></div>
    <iframe id="app" src="../index.html" style="width:0;height:0;border:0;" onload="runTests()"></iframe>
    <script>
      function logResult(name, pass, details) {
        const div = document.createElement('div');
        div.className = 'test';
        div.innerHTML = `<div>${pass ? '✅' : '❌'} <strong>${name}</strong> <span class="${pass ? 'ok' : 'fail'}">${pass ? 'PASS' : 'FAIL'}</span></div>` + (details ? `<pre>${details}</pre>` : '');
        document.getElementById('results').appendChild(div);
      }

      async function runTests() {
        const appWin = document.getElementById('app').contentWindow;
        const API = appWin.RunRunDiary;
        try {
          const data = await API.loadData();
          logResult('loadData returns data', !!data, JSON.stringify({ hasData: !!data, results: data?.results?.length }));
          logResult('athlete name', data?.athlete?.display_name === 'Elisa Park', data?.athlete?.display_name || 'missing');
          logResult('result count', data?.results?.length === 107, String(data?.results?.length));
          logResult('classifyDistance marathon', API.classifyDistance({ distance_miles: 26.2 }) === 'marathon', API.classifyDistance({ distance_miles: 26.2 }));
          logResult('formatDistance half', API.formatDistance({ distance_miles: 13.1, distance_km: 21.1 }) === '13.1 mi · 21.1 km', API.formatDistance({ distance_miles: 13.1, distance_km: 21.1 }));
          const trail = API.deriveVisibleResults(data.results, '', 'trail', 'date-desc');
          logResult('trail filter non-empty', trail.length > 0, String(trail.length));
          const chicago = API.deriveVisibleResults(data.results, 'Chicago', 'all', 'date-desc');
          logResult('search Chicago non-empty', chicago.length > 0, String(chicago.length));
        } catch (error) {
          logResult('Unhandled exception', false, error.stack || error.message);
        }
      }
    </script>
  </body>
</html>
